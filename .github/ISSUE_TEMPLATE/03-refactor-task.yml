name: Refactor Task
description: Track structural cleanup without intended behavior change.
title: "[Refactor] "
labels:
  - kind/refactor
body:
  - type: markdown
    attributes:
      value: |
        Use this when the goal is cleaner structure, lower risk, or easier maintenance without changing the intended product behavior.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - frontend
        - backend
        - devops
        - data
        - docs
        - cross-cutting
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One short paragraph describing the refactor task.
      placeholder: Consolidate duplicate retry logic in the sync worker.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation / Problem
      description: What risk, duplication, or maintenance cost is this addressing.
      placeholder: |
        - Existing duplication or risk:
        - Why it should be addressed now:
    validations:
      required: true
  - type: textarea
    id: in-scope
    attributes:
      label: In Scope
      placeholder: |
        - Consolidate retry policy helpers.
        - Update affected tests.
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] Duplicate implementations are removed.
        - [ ] Intended behavior remains unchanged.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context / Links
      description: Related issues, incidents, PRs, or review threads.
      placeholder: Related PR review, incident doc, follow-up reference
    validations:
      required: false
