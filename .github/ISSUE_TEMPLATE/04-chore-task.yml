name: Chore Task
description: Track maintenance, tooling, CI, scripts, or configuration work.
title: "[Chore] "
type: Chore
body:
  - type: markdown
    attributes:
      value: |
        Use this for maintenance work that supports delivery without introducing a new product capability.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - frontend
        - backend
        - devops
        - data
        - docs
        - cross-cutting
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One short paragraph describing the task.
      placeholder: Update CI to cache pnpm dependencies across workflow runs.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation / Problem
      description: What friction, risk, or operating cost is this addressing.
      placeholder: |
        - Current pain or risk:
        - Why it should be addressed now:
    validations:
      required: true
  - type: textarea
    id: in-scope
    attributes:
      label: In Scope
      placeholder: |
        - Update workflow cache configuration.
        - Verify pipeline behavior after the change.
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] The maintenance task is complete.
        - [ ] Operational impact is documented when needed.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context / Links
      description: Related incidents, runbooks, PRs, or docs.
      placeholder: Runbook link, related PR, deployment note
    validations:
      required: false
