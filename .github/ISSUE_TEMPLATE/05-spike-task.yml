name: Spike
description: Track a time-boxed investigation before committing to implementation.
title: "[Spike] "
labels:
  - kind/spike
body:
  - type: markdown
    attributes:
      value: |
        Use this when the team needs evidence or a recommendation before deciding on implementation scope.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - frontend
        - backend
        - devops
        - data
        - docs
        - cross-cutting
    validations:
      required: true
  - type: input
    id: question
    attributes:
      label: Research Question
      description: What decision or uncertainty should this spike resolve?
      placeholder: Which deployment path gives the lowest risk rollout for service X?
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: Background / Context
      description: What is unclear today, and why does it matter?
      placeholder: |
        - Current uncertainty:
        - Constraints:
        - Why a decision is needed:
    validations:
      required: true
  - type: textarea
    id: options
    attributes:
      label: Options to Evaluate
      description: List the candidate approaches or paths.
      placeholder: |
        - Option A:
        - Option B:
        - Option C:
    validations:
      required: true
  - type: input
    id: timebox
    attributes:
      label: Timebox
      description: Keep the investigation bounded.
      placeholder: 1-2 working days
    validations:
      required: true
  - type: textarea
    id: deliverable
    attributes:
      label: Expected Deliverable
      description: What concrete output should this spike produce?
      placeholder: Recommendation memo, prototype result, comparison table, risk summary
    validations:
      required: true
  - type: textarea
    id: exit-criteria
    attributes:
      label: Exit Criteria
      description: When can this spike be considered done?
      placeholder: |
        - [ ] The options have been compared.
        - [ ] A recommendation is documented.
        - [ ] Follow-up implementation work is identified.
    validations:
      required: true
