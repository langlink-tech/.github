name: Reusable Node Quality

on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: "."
      node-version:
        required: false
        type: string
        default: "22"
      package-manager:
        required: false
        type: string
        default: "pnpm"
      package-manager-version:
        required: false
        type: string
        default: ""
      cache-dependency-path:
        required: true
        type: string
      install-command:
        required: true
        type: string
      lint-command:
        required: false
        type: string
        default: ""
      typecheck-command:
        required: false
        type: string
        default: ""
      test-command:
        required: false
        type: string
        default: ""
      test-shards:
        required: false
        type: string
        default: '["1/1"]'
      build-command:
        required: false
        type: string
        default: ""
      timeout-minutes:
        required: false
        type: number
        default: 20
      combine-static-checks:
        description: When true, run lint and typecheck in one job to reduce runner queue tax
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  static-checks:
    if: ${{ inputs.combine-static-checks && (inputs.lint-command != '' || inputs.typecheck-command != '') }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm
        with:
          working-directory: ${{ inputs.working-directory }}
          node-version: ${{ inputs.node-version }}
          package-manager: ${{ inputs.package-manager }}
          package-manager-version: ${{ inputs.package-manager-version }}
          cache-dependency-path: ${{ inputs.cache-dependency-path }}
          install-command: ${{ inputs.install-command }}

      - name: Run lint command
        if: ${{ inputs.lint-command != '' }}
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.lint-command }}

      - name: Run typecheck command
        if: ${{ inputs.typecheck-command != '' }}
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.typecheck-command }}

  lint:
    if: ${{ inputs.combine-static-checks == false && inputs.lint-command != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm
        with:
          working-directory: ${{ inputs.working-directory }}
          node-version: ${{ inputs.node-version }}
          package-manager: ${{ inputs.package-manager }}
          package-manager-version: ${{ inputs.package-manager-version }}
          cache-dependency-path: ${{ inputs.cache-dependency-path }}
          install-command: ${{ inputs.install-command }}

      - name: Run lint command
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.lint-command }}

  typecheck:
    if: ${{ inputs.combine-static-checks == false && inputs.typecheck-command != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm
        with:
          working-directory: ${{ inputs.working-directory }}
          node-version: ${{ inputs.node-version }}
          package-manager: ${{ inputs.package-manager }}
          package-manager-version: ${{ inputs.package-manager-version }}
          cache-dependency-path: ${{ inputs.cache-dependency-path }}
          install-command: ${{ inputs.install-command }}

      - name: Run typecheck command
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.typecheck-command }}

  tests:
    if: inputs.test-command != ''
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(inputs.test-shards) }}
    env:
      TEST_SHARD: ${{ matrix.shard }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm
        with:
          working-directory: ${{ inputs.working-directory }}
          node-version: ${{ inputs.node-version }}
          package-manager: ${{ inputs.package-manager }}
          package-manager-version: ${{ inputs.package-manager-version }}
          cache-dependency-path: ${{ inputs.cache-dependency-path }}
          install-command: ${{ inputs.install-command }}

      - name: Run test command
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.test-command }}

  build:
    if: inputs.build-command != ''
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm
        with:
          working-directory: ${{ inputs.working-directory }}
          node-version: ${{ inputs.node-version }}
          package-manager: ${{ inputs.package-manager }}
          package-manager-version: ${{ inputs.package-manager-version }}
          cache-dependency-path: ${{ inputs.cache-dependency-path }}
          install-command: ${{ inputs.install-command }}

      - name: Run build command
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.build-command }}
