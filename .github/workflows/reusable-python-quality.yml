name: Reusable Python Quality

on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: "."
      python-version:
        required: false
        type: string
        default: "3.11"
      installer:
        required: false
        type: string
        default: "pip"
      uv-version:
        required: false
        type: string
        default: "0.11.6"
      cache-dependency-path:
        required: true
        type: string
      install-command:
        required: true
        type: string
      lint-command:
        required: false
        type: string
        default: ""
      invariant-command:
        required: false
        type: string
        default: ""
      test-command:
        required: false
        type: string
        default: ""
      upload-source-artifact:
        required: false
        type: boolean
        default: false
      source-artifact-name:
        required: false
        type: string
        default: repo-source
      timeout-minutes:
        required: false
        type: number
        default: 20

permissions:
  contents: read

jobs:
  lint:
    if: inputs.lint-command != ''
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-python-tooling
        with:
          working-directory: ${{ inputs.working-directory }}
          python-version: ${{ inputs.python-version }}
          installer: ${{ inputs.installer }}
          uv-version: ${{ inputs.uv-version }}
          cache-dependency-path: ${{ inputs.cache-dependency-path }}
          install-command: ${{ inputs.install-command }}
          cache-suffix: lint

      - name: Run lint command
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.lint-command }}

  invariants:
    if: inputs.invariant-command != ''
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-python-tooling
        with:
          working-directory: ${{ inputs.working-directory }}
          python-version: ${{ inputs.python-version }}
          installer: ${{ inputs.installer }}
          uv-version: ${{ inputs.uv-version }}
          cache-dependency-path: ${{ inputs.cache-dependency-path }}
          install-command: ${{ inputs.install-command }}
          cache-suffix: invariants

      - name: Run invariant command
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.invariant-command }}

  tests:
    if: inputs.test-command != ''
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-python-tooling
        with:
          working-directory: ${{ inputs.working-directory }}
          python-version: ${{ inputs.python-version }}
          installer: ${{ inputs.installer }}
          uv-version: ${{ inputs.uv-version }}
          cache-dependency-path: ${{ inputs.cache-dependency-path }}
          install-command: ${{ inputs.install-command }}
          cache-suffix: tests

      - name: Run test command
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.test-command }}

      - name: Pack repository source for downstream checks
        if: inputs.upload-source-artifact
        run: git archive --format=tar.gz --output=repo-source.tgz HEAD

      - uses: actions/upload-artifact@v6
        if: inputs.upload-source-artifact
        with:
          name: ${{ inputs.source-artifact-name }}
          path: repo-source.tgz
          if-no-files-found: error
          retention-days: 1
